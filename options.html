<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WA Extractor — Settings</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 480px;
      margin: 48px auto;
      padding: 0 24px;
      color: #1a1a1a;
    }
    h1 { font-size: 1.2rem; margin-bottom: 4px; }
    p.hint { font-size: 0.85rem; color: #555; margin: 0 0 20px; }
    label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      margin-top: 14px;
      padding: 8px 20px;
      background: #128c7e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { background: #0e7267; }
    #status {
      margin-top: 12px;
      font-size: 0.85rem;
      min-height: 1.2em;
    }
    #status.ok  { color: #128c7e; }
    #status.err { color: #c0392b; }
    a { color: #128c7e; }
  </style>
</head>
<body>
  <h1>WhatsApp Extractor — Settings</h1>
  <p class="hint">
    Get a free key at
    <a href="https://aistudio.google.com/app/apikey" target="_blank">
      aistudio.google.com/app/apikey
    </a>.
    The key is saved only in your browser — never written to any file on disk.
  </p>

  <label for="apiKey">Gemini API Key</label>
  <input type="password" id="apiKey" placeholder="AIzaSy…" autocomplete="off" />

  <button id="save">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
